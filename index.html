<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>네이버 키워드 분석 도구 – KeywordLens</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
/* ===================================================
   KeywordLens - 네이버 키워드 분석 도구
=================================================== */
:root {
  --primary: #03C75A;
  --primary-dark: #02a84b;
  --primary-light: #e6f9ef;
  --naver-green: #03C75A;
  --accent: #4F46E5;
  --accent-light: #EEF2FF;
  --danger: #EF4444;
  --warning: #F59E0B;
  --info: #3B82F6;
  --bg: #F0F2F5;
  --surface: #FFFFFF;
  --surface-2: #F8FAFC;
  --border: #E2E8F0;
  --border-dark: #CBD5E1;
  --text-primary: #0F172A;
  --text-secondary: #475569;
  --text-muted: #94A3B8;
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow: 0 4px 16px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
  --radius: 14px;
  --radius-sm: 8px;
  --radius-lg: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
}

/* Header */
.header { position: sticky; top: 0; z-index: 100; background: var(--surface); border-bottom: 1px solid var(--border); box-shadow: var(--shadow-sm); }
.header-inner { max-width: 1280px; margin: 0 auto; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 34px; height: 34px; background: linear-gradient(135deg, var(--primary) 0%, #00a84f 100%); border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 15px; }
.logo-text { font-size: 18px; font-weight: 800; color: var(--text-primary); letter-spacing: -0.5px; }
.logo-badge { background: var(--primary); color: #fff; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 20px; letter-spacing: 0.5px; }
.btn-settings { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all .2s; }
.btn-settings:hover { background: var(--surface); border-color: var(--primary); color: var(--primary); }

/* Main */
.main { max-width: 1280px; margin: 0 auto; padding: 28px 24px 60px; }

/* Search Panel */
.search-panel { background: var(--surface); border-radius: var(--radius-lg); padding: 28px 32px; box-shadow: var(--shadow); margin-bottom: 28px; }
.search-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.section-title { font-size: 16px; font-weight: 700; color: var(--text-primary); }
.keyword-counter { font-size: 13px; font-weight: 600; color: var(--text-muted); background: var(--surface-2); padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); }
.keyword-counter span { color: var(--primary); }
.keyword-input-area { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; min-height: 52px; padding: 10px 16px; background: var(--surface-2); border: 2px solid var(--border); border-radius: var(--radius); cursor: text; transition: border-color .2s; }
.keyword-input-area:focus-within { border-color: var(--primary); background: #fff; }
.keyword-input { flex: 1; min-width: 200px; border: none; background: transparent; outline: none; font-size: 14px; font-family: inherit; color: var(--text-primary); }
.keyword-input::placeholder { color: var(--text-muted); }
.keyword-tags { display: contents; }
.keyword-tag { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; color: #fff; cursor: default; animation: tagIn .2s ease; }
@keyframes tagIn { from { opacity: 0; transform: scale(.85); } to { opacity: 1; transform: scale(1); } }
.keyword-tag .tag-remove { background: rgba(255,255,255,.3); border: none; color: #fff; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 10px; transition: background .15s; }
.keyword-tag .tag-remove:hover { background: rgba(255,255,255,.5); }
.search-actions { display: flex; justify-content: flex-end; align-items: center; gap: 12px; margin-top: 16px; }
.btn-clear { padding: 10px 20px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all .2s; font-family: inherit; }
.btn-clear:hover { border-color: var(--danger); color: var(--danger); }
.btn-analyze { padding: 10px 28px; background: var(--primary); border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; color: #fff; cursor: pointer; transition: all .2s; display: flex; align-items: center; gap: 8px; font-family: inherit; box-shadow: 0 4px 14px rgba(3,199,90,.3); }
.btn-analyze:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(3,199,90,.4); }
.btn-analyze:active { transform: translateY(0); }
.btn-analyze:disabled { background: var(--border-dark); box-shadow: none; cursor: not-allowed; transform: none; }
.keyword-suggestions { display: flex; align-items: center; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.suggestion-label { font-size: 12px; color: var(--text-muted); }
.suggestion-chip { padding: 4px 12px; background: transparent; border: 1px solid var(--border); border-radius: 20px; font-size: 12px; font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all .15s; font-family: inherit; }
.suggestion-chip:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

/* Loading */
.loading-overlay { display: flex; justify-content: center; align-items: center; padding: 80px 0; }
.loading-box { text-align: center; }
.loading-spinner { width: 52px; height: 52px; border: 4px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .8s linear infinite; margin: 0 auto 18px; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 15px; font-weight: 600; color: var(--text-primary); }
.loading-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

/* Empty State */
.empty-state { text-align: center; padding: 80px 20px; }
.empty-icon { font-size: 56px; color: var(--border-dark); margin-bottom: 20px; }
.empty-state h3 { font-size: 18px; font-weight: 700; color: var(--text-secondary); margin-bottom: 8px; }
.empty-state p { font-size: 14px; color: var(--text-muted); line-height: 1.8; }

/* Tabs */
.tab-nav { display: flex; gap: 4px; background: var(--surface); padding: 6px; border-radius: var(--radius); box-shadow: var(--shadow-sm); margin-bottom: 24px; border: 1px solid var(--border); overflow-x: auto; }
.tab-btn { flex: 1; min-width: 120px; padding: 10px 20px; background: transparent; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 7px; font-family: inherit; white-space: nowrap; }
.tab-btn:hover { color: var(--text-secondary); background: var(--surface-2); }
.tab-btn.active { background: var(--primary); color: #fff; box-shadow: 0 3px 10px rgba(3,199,90,.3); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Overview Grid */
.overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; }
.kw-card { background: var(--surface); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); transition: box-shadow .2s, transform .2s; }
.kw-card:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
.kw-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.kw-color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.kw-card-title { font-size: 17px; font-weight: 800; color: var(--text-primary); flex: 1; }
.kw-competition { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; }
.comp-dot { width: 8px; height: 8px; border-radius: 50%; }
.comp-high { color: var(--danger); }
.comp-high .comp-dot { background: var(--danger); }
.comp-mid { color: var(--warning); }
.comp-mid .comp-dot { background: var(--warning); }
.comp-low { color: var(--primary); }
.comp-low .comp-dot { background: var(--primary); }

/* Stats Row */
.kw-stats-main { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.stat-item { text-align: center; padding: 12px 8px; background: var(--surface-2); border-radius: var(--radius-sm); border: 1px solid var(--border); }
.stat-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.stat-value { font-size: 18px; font-weight: 800; color: var(--text-primary); }
.stat-value.highlight { color: var(--primary); }
.stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* Device Split Bar */
.device-split { margin-bottom: 20px; }
.device-split-label { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
.device-split-label .pc { color: var(--accent); }
.device-split-label .mo { color: var(--primary); }
.device-bar { height: 10px; border-radius: 10px; overflow: hidden; background: var(--border); display: flex; }
.device-bar-pc { background: var(--accent); height: 100%; transition: width .6s ease; }
.device-bar-mo { background: var(--primary); height: 100%; transition: width .6s ease; }

/* Gender + Age mini */
.kw-mini-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.mini-chart-box { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }
.mini-chart-title { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.gender-bars { display: flex; flex-direction: column; gap: 6px; }
.gender-row { display: flex; align-items: center; gap: 8px; }
.gender-icon { font-size: 13px; width: 14px; text-align: center; }
.gender-icon.male { color: #3B82F6; }
.gender-icon.female { color: #EC4899; }
.gender-bar-wrap { flex: 1; background: var(--border); height: 8px; border-radius: 4px; overflow: hidden; }
.gender-bar-fill { height: 100%; border-radius: 4px; transition: width .6s ease; }
.gender-bar-fill.male { background: #3B82F6; }
.gender-bar-fill.female { background: #EC4899; }
.gender-pct { font-size: 12px; font-weight: 700; color: var(--text-primary); min-width: 32px; text-align: right; }
.age-bars { display: flex; align-items: flex-end; gap: 4px; height: 40px; }
.age-bar-col { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; gap: 2px; }
.age-bar-fill { width: 100%; border-radius: 3px 3px 0 0; transition: height .6s ease; min-height: 2px; }
.age-bar-lbl { font-size: 9px; color: var(--text-muted); }

/* CTR badges */
.ctr-badges { display: flex; gap: 8px; margin-top: 12px; }
.ctr-badge { flex: 1; text-align: center; padding: 8px; border-radius: var(--radius-sm); }
.ctr-badge.pc-badge { background: var(--accent-light); }
.ctr-badge.mo-badge { background: var(--primary-light); }
.ctr-badge-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
.ctr-badge.pc-badge .ctr-badge-label { color: var(--accent); }
.ctr-badge.mo-badge .ctr-badge-label { color: var(--primary); }
.ctr-badge-value { font-size: 16px; font-weight: 800; }
.ctr-badge.pc-badge .ctr-badge-value { color: var(--accent); }
.ctr-badge.mo-badge .ctr-badge-value { color: var(--primary); }
.ctr-badge-sub { font-size: 10px; color: var(--text-muted); }

/* Target Analysis */
.target-keyword-nav { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }
.target-kw-btn { padding: 7px 18px; border-radius: 20px; border: 2px solid var(--border); background: var(--surface); font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; transition: all .2s; font-family: inherit; }
.target-kw-btn.active { color: #fff; border-color: transparent; }
.target-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.target-chart-card { background: var(--surface); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); }
.target-chart-card h3 { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.target-chart-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 20px; }
.gender-donut-wrap { display: flex; align-items: center; gap: 24px; }
.gender-donut-wrap canvas { max-width: 160px; max-height: 160px; }
.gender-legend { flex: 1; }
.gender-legend-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--border); }
.gender-legend-item:last-child { border-bottom: none; }
.legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }
.legend-label { flex: 1; font-size: 13px; font-weight: 500; color: var(--text-secondary); }
.legend-pct { font-size: 16px; font-weight: 800; color: var(--text-primary); }
.legend-count { font-size: 11px; color: var(--text-muted); }
.age-chart-wrap { height: 200px; }
.age-chart-wrap canvas { width: 100% !important; }
.insight-box { background: linear-gradient(135deg, #f0fdf4 0%, #eff6ff 100%); border: 1px solid #bbf7d0; border-radius: var(--radius-sm); padding: 14px 16px; margin-top: 16px; display: flex; gap: 10px; align-items: flex-start; }
.insight-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.insight-text { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
.insight-text strong { color: var(--text-primary); }

/* Trend Chart */
.trend-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
.trend-period-btns, .trend-device-btns { display: flex; gap: 4px; background: var(--surface); padding: 4px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
.period-btn, .device-btn { padding: 7px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; color: var(--text-muted); background: transparent; cursor: pointer; transition: all .2s; font-family: inherit; }
.period-btn.active, .device-btn.active { background: var(--primary); color: #fff; }
.period-btn:hover:not(.active), .device-btn:hover:not(.active) { background: var(--surface-2); color: var(--text-secondary); }
.trend-chart-wrap { background: var(--surface); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--border); height: 380px; position: relative; }
.trend-chart-wrap canvas { width: 100% !important; height: 100% !important; }
.trend-legend { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px; padding: 16px 20px; background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); }
.trend-legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 600; color: var(--text-secondary); }
.trend-legend-line { width: 24px; height: 3px; border-radius: 2px; }

/* Efficiency Table */
.efficiency-table-wrap { background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid var(--border); overflow-x: auto; }
.efficiency-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.efficiency-table thead th { padding: 14px 16px; background: var(--surface-2); font-weight: 700; color: var(--text-secondary); text-align: center; border-bottom: 2px solid var(--border); white-space: nowrap; }
.efficiency-table thead th:first-child { text-align: left; padding-left: 24px; }
.efficiency-table tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
.efficiency-table tbody tr:last-child { border-bottom: none; }
.efficiency-table tbody tr:hover { background: var(--surface-2); }
.efficiency-table tbody td { padding: 14px 16px; text-align: center; color: var(--text-primary); }
.efficiency-table tbody td:first-child { text-align: left; padding-left: 24px; }
.th-pc { color: var(--accent); font-size: 10px; font-weight: 700; background: var(--accent-light); padding: 2px 6px; border-radius: 4px; display: inline-block; }
.th-mo { color: var(--primary); font-size: 10px; font-weight: 700; background: var(--primary-light); padding: 2px 6px; border-radius: 4px; display: inline-block; }
.kw-name-cell { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; }
.kw-dot-sm { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.num-value { font-weight: 700; }
.ctr-value { font-weight: 600; }
.score-bar-wrap { display: flex; align-items: center; gap: 8px; justify-content: center; }
.score-bar-bg { width: 80px; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.score-bar-fill { height: 100%; border-radius: 4px; transition: width .6s; }
.score-num { font-size: 13px; font-weight: 700; min-width: 28px; }
.comp-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
.comp-badge.high { background: #FEF2F2; color: var(--danger); }
.comp-badge.mid { background: #FFFBEB; color: var(--warning); }
.comp-badge.low { background: var(--primary-light); color: var(--primary); }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, .5); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
.modal { background: var(--surface); border-radius: var(--radius-lg); width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: modalIn .25s ease; }
@keyframes modalIn { from { opacity: 0; transform: scale(.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-header { padding: 22px 24px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-header h3 { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.modal-close { width: 32px; height: 32px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 14px; transition: all .15s; }
.modal-close:hover { background: #FEF2F2; border-color: var(--danger); color: var(--danger); }
.modal-body { padding: 20px 24px; }
.modal-section { margin-bottom: 24px; }
.modal-section h4 { font-size: 14px; font-weight: 700; color: var(--text-primary); margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.3px; }
.form-group input { width: 100%; padding: 10px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-family: inherit; color: var(--text-primary); transition: border-color .2s; outline: none; }
.form-group input:focus { border-color: var(--primary); background: #fff; }
.modal-notice { background: #FFFBEB; border: 1px solid #FDE68A; border-radius: var(--radius-sm); padding: 12px 16px; display: flex; gap: 8px; align-items: flex-start; font-size: 13px; color: #92400E; }
.modal-footer { padding: 18px 24px 22px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
.btn-modal-cancel { padding: 10px 20px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: all .15s; }
.btn-modal-cancel:hover { border-color: var(--border-dark); }
.btn-modal-save { padding: 10px 24px; background: var(--primary); border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 700; color: #fff; cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 6px; transition: all .15s; }
.btn-modal-save:hover { background: var(--primary-dark); }

/* Toast */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--text-primary); color: #fff; padding: 12px 24px; border-radius: var(--radius); font-size: 13px; font-weight: 600; box-shadow: var(--shadow-lg); z-index: 999; opacity: 0; transition: all .3s ease; white-space: nowrap; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--primary); }
.toast.error { background: var(--danger); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-dark); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

/* Responsive */
@media (max-width: 900px) {
  .target-charts { grid-template-columns: 1fr; }
  .target-charts .target-chart-card[style*="grid-column"] { grid-column: span 1 !important; }
}
@media (max-width: 768px) {
  .main { padding: 20px 16px 40px; }
  .search-panel { padding: 20px; }
  .overview-grid { grid-template-columns: 1fr; }
  .tab-nav { gap: 2px; }

<script>
/* =====================================================
   mockData.js - Mock 데이터 생성기
===================================================== */
const KEYWORD_COLORS = [
  '#4F46E5','#EC4899','#F59E0B','#10B981',
  '#3B82F6','#EF4444','#8B5CF6','#06B6D4',
  '#F97316','#14B8A6'
];

function generateTrendData(months, seed, pattern) {
  const data = [];
  const now = new Date();
  for (let i = months - 1; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const label = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    let base = 50 + seed * 10;
    let seasonMod = Math.sin((d.getMonth() / 12) * Math.PI * 2 + pattern) * 20;
    let noise = (Math.random() - 0.5) * 15;
    let val = Math.max(5, Math.min(100, Math.round(base + seasonMod + noise)));
    data.push({ period: label, ratio: val });
  }
  return data;
}

function generateAgeRatio(dominantAge) {
  const ages = ['10대', '20대', '30대', '40대', '50대', '60대+'];
  const base = [5, 15, 25, 25, 20, 10];
  const result = base.map((v, i) => {
    let adjusted = v + (i === dominantAge ? 20 : -Math.floor(20 / 5));
    return Math.max(1, adjusted);
  });
  const total = result.reduce((a, b) => a + b, 0);
  return result.map((v, i) => ({
    label: ages[i],
    ratio: Math.round((v / total) * 100)
  }));
}

function generateMockKeywordData(keyword, index) {
  const seed = (keyword.charCodeAt(0) + keyword.length) % 10;
  const rng = (min, max) => Math.floor(min + ((seed * 7 + index * 13 + keyword.length * 3) % (max - min + 1)));
  const rngFloat = (min, max) => Math.round((min + ((seed * 3.14 + index * 2.71) % (max - min))) * 100) / 100;

  const mobileRatio = rng(55, 85);
  const pcRatio = 100 - mobileRatio;
  const mobileSearch = rng(2000, 80000);
  const pcSearch = Math.round(mobileSearch * (pcRatio / mobileRatio));
  const totalSearch = mobileSearch + pcSearch;

  const maleRatio = rng(30, 70);
  const femaleRatio = 100 - maleRatio;
  const dominantAge = rng(0, 5);
  const ageRatio = generateAgeRatio(dominantAge);

  const pcCtr = rngFloat(0.5, 4.5);
  const moCtr = rngFloat(1.0, 6.5);
  const pcClicks = Math.round(pcSearch * (pcCtr / 100));
  const moClicks = Math.round(mobileSearch * (moCtr / 100));

  const compRaw = rng(0, 100);
  const competition = compRaw < 33 ? 'low' : compRaw < 66 ? 'mid' : 'high';
  const competitionLabel = { low: '낮음', mid: '보통', high: '높음' }[competition];

  const allTrendData = {
    pc: generateTrendData(12, seed, index * 0.8),
    mo: generateTrendData(12, seed + 2, index * 0.8 + 0.5),
  };
  allTrendData.all = allTrendData.pc.map((d, i) => ({
    period: d.period,
    ratio: Math.round((d.ratio + allTrendData.mo[i].ratio) / 2)
  }));

  const compScore = { low: 100, mid: 60, high: 30 }[competition];
  const efficiencyScore = Math.round(
    (Math.log10(totalSearch) / 5) * 35 +
    ((pcCtr + moCtr) / 2 / 6) * 35 +
    (compScore / 100) * 30
  );

  return {
    keyword, color: KEYWORD_COLORS[index % KEYWORD_COLORS.length], index,
    found: true,
    totalSearch, pcSearch, mobileSearch, pcRatio, mobileRatio,
    maleRatio, femaleRatio, ageRatio,
    pcCtr, moCtr, pcClicks, moClicks,
    competition, competitionLabel,
    trendData: allTrendData,
    efficiencyScore: Math.min(99, Math.max(10, efficiencyScore)),
    trendDirection: (() => {
      const all = allTrendData.all;
      const last = all[all.length - 1].ratio;
      const prev = all[all.length - 2].ratio;
      if (last > prev + 5) return 'up';
      if (last < prev - 5) return 'down';
      return 'flat';
    })()
  };
}

function generateMockData(kws) {
  return kws.map((kw, i) => generateMockKeywordData(kw.trim(), i));
}

function formatNumber(n) {
  if (!n && n !== 0) return '-';
  return n.toLocaleString('ko-KR');
}

function formatPeriodLabel(period, short = false) {
  const [y, m] = period.split('-');
  if (short) return `${parseInt(m)}월`;
  return `${y}.${m}`;
}

/* =====================================================
   api.js - API 클라이언트
===================================================== */
const ApiClient = (() => {
  function getWorkerUrl() {
    return (localStorage.getItem('kl_workerUrl') || '').replace(/\/$/, '');
  }
  async function apiFetch(endpoint, options = {}) {
    const workerUrl = getWorkerUrl();
    if (!workerUrl) throw new ApiError('Worker URL 미설정', 'NO_WORKER_URL');
    let response;
    try {
      response = await fetch(`${workerUrl}${endpoint}`, {
        ...options,
        headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
      });
    } catch (e) {
      throw new ApiError('네트워크 오류', 'NETWORK_ERROR');
    }
    if (!response.ok) {
      let errBody = {};
      try { errBody = await response.json(); } catch {}
      throw new ApiError(errBody.error || `API 오류 (${response.status})`, 'API_ERROR', response.status, errBody.detail);
    }
    return response.json();
  }
  async function fetchKeywordData(keywords) {
    const data = await apiFetch('/keyword', { method: 'POST', body: JSON.stringify({ keywords }) });
    return data.keywords || [];
  }
  async function fetchTrendData(keywords, period = 3, device = 'all') {
    const { startDate, endDate } = getPeriodDates(period);
    const deviceParam = device === 'all' ? undefined : device;
    const data = await apiFetch('/trend', {
      method: 'POST',
      body: JSON.stringify({ keywords, startDate, endDate, device: deviceParam }),
    });
    return parseTrendResponse(data, keywords);
  }
  function getPeriodDates(months) {
    const end = new Date(); const start = new Date();
    start.setMonth(start.getMonth() - months);
    start.setDate(1); end.setDate(1); end.setDate(0);
    return { startDate: formatDate(start), endDate: formatDate(end) };
  }
  function formatDate(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function parseTrendResponse(raw, requestedKeywords) {
    const results = raw.results || [];
    const trendMap = {};
    results.forEach(group => {
      trendMap[group.title] = group.data.map(d => ({
        period: d.period.substring(0, 7),
        ratio: Math.round(d.ratio),
      }));
    });
    return requestedKeywords.map(kw => ({ keyword: kw, data: trendMap[kw] || [] }));
  }
  async function healthCheck() { return apiFetch('/health'); }
  return { fetchKeywordData, fetchTrendData, healthCheck, getPeriodDates, formatDate };
})();

class ApiError extends Error {
  constructor(message, code, status, detail) {
    super(message);
    this.name = 'ApiError'; this.code = code; this.status = status; this.detail = detail;
  }
}

/* =====================================================
   charts.js - Chart.js 렌더링 모듈
===================================================== */
Chart.register(ChartDataLabels);

let trendChartInstance = null;
let genderChartInstances = {};
let ageChartInstances = {};

const GENDER_COLORS = { male: '#3B82F6', female: '#EC4899' };
const AGE_COLORS = ['#818CF8','#A78BFA','#4F46E5','#6366F1','#3B82F6','#06B6D4'];
const BASE_FONT = { family: "'Pretendard','Apple SD Gothic Neo',sans-serif", size: 12 };

function renderGenderDonut(canvasId, data) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  if (genderChartInstances[canvasId]) genderChartInstances[canvasId].destroy();
  genderChartInstances[canvasId] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['남성', '여성'],
      datasets: [{ data: [data.maleRatio, data.femaleRatio], backgroundColor: [GENDER_COLORS.male, GENDER_COLORS.female], borderWidth: 3, borderColor: '#fff', hoverOffset: 6 }]
    },
    options: {
      responsive: true, maintainAspectRatio: true, cutout: '68%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: (ctx) => ` ${ctx.label}: ${ctx.parsed}%` } },
        datalabels: { display: false }
      }
    }
  });
}

function renderAgeBar(canvasId, ageRatio, color) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  if (ageChartInstances[canvasId]) ageChartInstances[canvasId].destroy();
  const maxRatio = Math.max(...ageRatio.map(a => a.ratio));
  ageChartInstances[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ageRatio.map(a => a.label),
      datasets: [{ data: ageRatio.map(a => a.ratio), backgroundColor: ageRatio.map(a => a.ratio === maxRatio ? color : color + '55'), borderRadius: 6, borderSkipped: false }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: (ctx) => ` ${ctx.parsed.y}%` } },
        datalabels: { anchor: 'end', align: 'end', color: '#475569', font: { ...BASE_FONT, size: 11, weight: '600' }, formatter: (v) => v + '%', offset: -2 }
      },
      scales: {
        x: { grid: { display: false }, border: { display: false }, ticks: { font: BASE_FONT, color: '#94A3B8' } },
        y: { display: false, max: maxRatio + 15, beginAtZero: true }
      }
    }
  });
}

function renderTrendChart(allData, period, device) {
  const ctx = document.getElementById('trendChart');
  if (!ctx) return;
  if (trendChartInstance) trendChartInstance.destroy();
  const now = new Date();
  const cutoff = new Date(now.getFullYear(), now.getMonth() - period + 1, 1);
  const filteredData = allData.map(d => {
    const trend = d.trendData[device];
    const filtered = trend.filter(t => {
      const [y, m] = t.period.split('-').map(Number);
      return new Date(y, m - 1, 1) >= cutoff;
    });
    return { ...d, filteredTrend: filtered };
  });
  const labels = filteredData[0]?.filteredTrend.map(t => formatPeriodLabel(t.period, period <= 3)) || [];
  const datasets = filteredData.map(d => ({
    label: d.keyword, data: d.filteredTrend.map(t => t.ratio),
    borderColor: d.color, backgroundColor: d.color + '15', borderWidth: 2.5,
    pointRadius: 4, pointHoverRadius: 7, pointBackgroundColor: d.color,
    pointBorderColor: '#fff', pointBorderWidth: 2, fill: filteredData.length === 1, tension: 0.35
  }));
  trendChartInstance = new Chart(ctx, {
    type: 'line', data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(15,23,42,.92)',
          titleFont: { ...BASE_FONT, size: 13, weight: '600' },
          bodyFont: { ...BASE_FONT, size: 13 }, padding: 12, cornerRadius: 10,
          callbacks: { label: (ctx) => `  ${ctx.dataset.label}: ${ctx.parsed.y}` }
        },
        datalabels: { display: false }
      },
      scales: {
        x: { grid: { color: '#F1F5F9', drawBorder: false }, border: { display: false }, ticks: { font: BASE_FONT, color: '#94A3B8' } },
        y: { min: 0, max: 100, grid: { color: '#F1F5F9', drawBorder: false }, border: { display: false }, ticks: { font: BASE_FONT, color: '#94A3B8', stepSize: 20, callback: (v) => v } }
      }
    }
  });
}

function renderTrendLegend(allData) {
  const container = document.getElementById('trendLegend');
  if (!container) return;
  container.innerHTML = allData.map(d => `
    <div class="trend-legend-item">
      <div class="trend-legend-line" style="background:${d.color}"></div>
      <span>${d.keyword}</span>
    </div>
  `).join('');
}

function getScoreColor(score) {
  if (score >= 70) return '#10B981';
  if (score >= 45) return '#F59E0B';
  return '#EF4444';
}

function destroyAllCharts() {
  if (trendChartInstance) { trendChartInstance.destroy(); trendChartInstance = null; }
  Object.values(genderChartInstances).forEach(c => c.destroy());
  genderChartInstances = {};
  Object.values(ageChartInstances).forEach(c => c.destroy());
  ageChartInstances = {};
}

/* =====================================================
   app.js - 메인 앱 로직
===================================================== */
function isApiMode() { return !!localStorage.getItem('kl_workerUrl'); }

let keywords = [];
let analysisData = [];
let rawTrendData = [];
let activeTab = 'overview';
let activeTargetKwIndex = 0;
let trendPeriod = 3;
let trendDevice = 'all';

const keywordInput   = document.getElementById('keywordInput');
const keywordTags    = document.getElementById('keywordTags');
const kwCount        = document.getElementById('kwCount');
const btnAnalyze     = document.getElementById('btnAnalyze');
const btnClear       = document.getElementById('btnClear');
const resultsSection = document.getElementById('resultsSection');
const emptyState     = document.getElementById('emptyState');
const loadingOverlay = document.getElementById('loadingOverlay');
const loadingStatus  = document.getElementById('loadingStatus');
const modalOverlay   = document.getElementById('modalOverlay');
const btnSettings    = document.getElementById('btnSettings');
const modalClose     = document.getElementById('modalClose');
const modalCancel    = document.getElementById('modalCancel');
const modalSave      = document.getElementById('modalSave');

function addKeyword(kw) {
  kw = kw.trim().replace(/[,，]/g, '');
  if (!kw) return;
  if (keywords.length >= 10) { showToast('키워드는 최대 10개까지 입력할 수 있습니다.', 'error'); return; }
  if (keywords.includes(kw)) { showToast(`'${kw}'은(는) 이미 추가된 키워드입니다.`, 'error'); return; }
  keywords.push(kw);
  renderTags();
  keywordInput.value = '';
}

function removeKeyword(kw) {
  keywords = keywords.filter(k => k !== kw);
  renderTags();
}

function renderTags() {
  keywordTags.innerHTML = keywords.map((kw, i) => `
    <span class="keyword-tag" style="background:${KEYWORD_COLORS[i % KEYWORD_COLORS.length]}">
      ${kw}
      <button class="tag-remove" data-kw="${kw}" title="삭제"><i class="fa-solid fa-xmark"></i></button>
    </span>
  `).join('');
  kwCount.textContent = keywords.length;
  btnAnalyze.disabled = keywords.length === 0;
  keywordTags.querySelectorAll('.tag-remove').forEach(btn => {
    btn.addEventListener('click', (e) => { e.stopPropagation(); removeKeyword(btn.dataset.kw); });
  });
}

keywordInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ',') { e.preventDefault(); addKeyword(keywordInput.value); }
  if (e.key === 'Backspace' && !keywordInput.value && keywords.length > 0) removeKeyword(keywords[keywords.length - 1]);
});
keywordInput.addEventListener('input', (e) => {
  if (e.target.value.includes(',') || e.target.value.includes('，')) {
    const parts = e.target.value.split(/[,，]/);
    parts.slice(0, -1).forEach(p => addKeyword(p));
    e.target.value = parts[parts.length - 1];
  }
});
document.getElementById('keywordInputArea').addEventListener('click', () => keywordInput.focus());
document.querySelectorAll('.suggestion-chip').forEach(chip => {
  chip.addEventListener('click', () => addKeyword(chip.dataset.kw));
});
btnClear.addEventListener('click', () => {
  keywords = []; analysisData = []; rawTrendData = [];
  renderTags();
  resultsSection.style.display = 'none';
  emptyState.style.display = '';
  destroyAllCharts();
});
btnAnalyze.addEventListener('click', runAnalysis);

async function runAnalysis() {
  if (keywords.length === 0) return;
  showLoading(true, '분석 준비 중...');
  try {
    if (isApiMode()) { await runRealAnalysis(); }
    else { await runMockAnalysis(); }
    activeTargetKwIndex = 0;
    showLoading(false);
    renderResults();
  } catch (err) {
    showLoading(false);
    handleApiError(err);
  }
}

async function runRealAnalysis() {
  updateLoadingStatus('키워드 데이터 조회 중...');
  const kwResults = await ApiClient.fetchKeywordData(keywords);
  updateLoadingStatus('검색 트렌드 수집 중...');
  const trendResults = await ApiClient.fetchTrendData(keywords, trendPeriod, trendDevice);
  updateLoadingStatus('결과 처리 중...');
  analysisData = mergeApiResults(kwResults, trendResults, keywords);
  rawTrendData = trendResults;
}

async function runMockAnalysis() {
  const steps = ['검색광고 API 연결 중...','키워드 데이터 조회 중...','트렌드 데이터 수집 중...','결과 처리 중...'];
  for (let i = 0; i < steps.length; i++) { updateLoadingStatus(steps[i]); await sleep(250); }
  analysisData = generateMockData(keywords);
  rawTrendData = null;
}

function mergeApiResults(kwResults, trendResults, requestedKeywords) {
  return requestedKeywords.map((kw, idx) => {
    const kwData = kwResults.find(r => r.keyword === kw) || {};
    const trend  = trendResults.find(r => r.keyword === kw) || { data: [] };
    const compScore = { low: 100, mid: 60, high: 30 }[kwData.competition || 'low'];
    const total = kwData.totalSearch || 1;
    const avgCtr = ((kwData.pcCtr || 0) + (kwData.moCtr || 0)) / 2;
    const efficiencyScore = Math.round((Math.log10(Math.max(total, 10)) / 5) * 35 + (avgCtr / 6) * 35 + (compScore / 100) * 30);
    const trendArr = trend.data || [];
    let trendDirection = 'flat';
    if (trendArr.length >= 2) {
      const last = trendArr[trendArr.length - 1].ratio;
      const prev = trendArr[trendArr.length - 2].ratio;
      if (last > prev + 5) trendDirection = 'up';
      else if (last < prev - 5) trendDirection = 'down';
    }
    const trendByDevice = { all: trendArr, pc: trendArr, mo: trendArr };
    return {
      keyword: kw, color: KEYWORD_COLORS[idx % KEYWORD_COLORS.length], index: idx,
      found: kwData.found !== false,
      totalSearch: kwData.totalSearch || 0, pcSearch: kwData.pcSearch || 0, mobileSearch: kwData.mobileSearch || 0,
      pcRatio: kwData.pcRatio || 50, mobileRatio: kwData.mobileRatio || 50,
      pcCtr: kwData.pcCtr || 0, moCtr: kwData.moCtr || 0, pcClicks: kwData.pcClicks || 0, moClicks: kwData.moClicks || 0,
      competition: kwData.competition || 'low', competitionLabel: kwData.competitionLabel || '낮음',
      maleRatio: kwData.maleRatio || 50, femaleRatio: kwData.femaleRatio || 50,
      ageRatio: kwData.ageRatio || getDefaultAgeRatio(),
      trendData: trendByDevice, trendDirection,
      efficiencyScore: Math.min(99, Math.max(10, efficiencyScore)),
    };
  });
}

function getDefaultAgeRatio() {
  return [
    { label: '10대', ratio: 5 }, { label: '20대', ratio: 20 }, { label: '30대', ratio: 30 },
    { label: '40대', ratio: 25 }, { label: '50대', ratio: 15 }, { label: '60대+', ratio: 5 },
  ];
}

async function refreshTrendData() {
  if (!isApiMode() || !analysisData.length) {
    renderTrendChart(analysisData, trendPeriod, trendDevice);
    return;
  }
  try {
    const trendResults = await ApiClient.fetchTrendData(keywords, trendPeriod, trendDevice);
    rawTrendData = trendResults;
    trendResults.forEach(r => {
      const d = analysisData.find(a => a.keyword === r.keyword);
      if (d) d.trendData.all = r.data;
    });
    renderTrendChart(analysisData, trendPeriod, trendDevice);
  } catch (err) {
    resultsSection.style.display = '';
    renderTrendChart(analysisData, trendPeriod, trendDevice);
  }
}

function handleApiError(err) {
  if (err instanceof ApiError && err.code === 'NO_WORKER_URL') {
    // Worker URL 없으면 그냥 Mock으로 실행
    const mockData = generateMockData(keywords);
    analysisData = mockData;
    renderResults();
    return;
  }
  showToast('오류가 발생했습니다. Mock 데이터로 표시합니다.', 'error');
  if (!analysisData.length) {
    analysisData = generateMockData(keywords);
    renderResults();
  }
}

function showLoading(show, msg) {
  loadingOverlay.style.display = show ? 'flex' : 'none';
  if (show) { resultsSection.style.display = 'none'; emptyState.style.display = 'none'; if (msg) updateLoadingStatus(msg); }
}
function updateLoadingStatus(msg) { if (loadingStatus) loadingStatus.textContent = msg; }

}

          <div class="stat-sub">${d.pcRatio}%</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">MO 검색량</div>

function renderTarget() {
  const nav = document.getElementById('targetKeywordNav');
  nav.innerHTML = analysisData.map((d, i) => `
    <button class="target-kw-btn${i === activeTargetKwIndex ? ' active' : ''}" data-idx="${i}"
      style="${i === activeTargetKwIndex ? `background:${d.color};border-color:${d.color}` : ''}">
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${d.color};margin-right:5px;vertical-align:middle"></span>
      ${d.keyword}
    </button>
  `).join('');
  nav.querySelectorAll('.target-kw-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeTargetKwIndex = parseInt(btn.dataset.idx);
      renderTarget();
      renderTargetCharts(analysisData[activeTargetKwIndex]);
    });
  });
  renderTargetCharts(analysisData[activeTargetKwIndex]);
}

            <span class="legend-label"><i class="fa-solid fa-venus" style="color:#EC4899"></i> 여성</span>
            <div><div class="legend-pct">${d.femaleRatio}%</div><div class="legend-count">${formatNumber(Math.round(d.totalSearch * d.femaleRatio / 100))}건</div></div>
          </div>
        </div>
      </div>
      <div class="insight-box">
        <span class="insight-icon">💡</span>
        <span class="insight-text"><strong>"${d.keyword}"</strong> 키워드는 <strong>${dominantGender}</strong>이 주로 검색합니다.</span>
      </div>
    </div>
    <div class="target-chart-card">
      <h3><i class="fa-solid fa-chart-bar" style="color:${d.color}"></i> 연령대 분포</h3>
      <p class="target-chart-subtitle">"${d.keyword}" 키워드 검색 연령대 비율</p>

      <div style="margin-bottom:8px">
        <div style="font-size:11px;color:var(--text-muted)">검색량</div>
        <div style="font-size:20px;font-weight:800;color:${color}">${formatNumber(search)}</div>

}

function renderTrend() {
  renderTrendChart(analysisData, trendPeriod, trendDevice);
  renderTrendLegend(analysisData);
}

document.querySelectorAll('.period-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    trendPeriod = parseInt(btn.dataset.period);
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (analysisData.length > 0) await refreshTrendData();
  });
});
document.querySelectorAll('.device-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    trendDevice = btn.dataset.device;
    document.querySelectorAll('.device-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    if (analysisData.length > 0) {
      if (isApiMode()) await refreshTrendData();
      else renderTrendChart(analysisData, trendPeriod, trendDevice);

  });
});

/* Modal */
btnSettings.addEventListener('click', () => { loadApiSettings(); modalOverlay.style.display = 'flex'; });
[modalClose, modalCancel].forEach(el => el.addEventListener('click', () => { modalOverlay.style.display = 'none'; }));
modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.style.display = 'none'; });
modalSave.addEventListener('click', () => { saveApiSettings(); modalOverlay.style.display = 'none'; updateModeBadge(); showToast('✅ API 설정이 저장되었습니다.', 'success'); });

function saveApiSettings() {
  const el = document.getElementById('workerUrl');
  const val = el?.value?.trim();
  if (val) localStorage.setItem('kl_workerUrl', val);
  else localStorage.removeItem('kl_workerUrl');
}
function loadApiSettings() {
  const el = document.getElementById('workerUrl');
  if (el) el.value = localStorage.getItem('kl_workerUrl') || '';
}

/* Toast */
function showToast(msg, type = '') {
  let toast = document.getElementById('globalToast');
  if (!toast) { toast = document.createElement('div'); toast.id = 'globalToast'; toast.className = 'toast'; document.body.appendChild(toast); }
  toast.textContent = msg;
  toast.className = `toast ${type}`;
  setTimeout(() => toast.classList.add('show'), 10);
  setTimeout(() => toast.classList.remove('show'), 2800);
}

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

renderTags();
updateModeBadge();
